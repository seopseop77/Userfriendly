name: Deploy llm-tracker-signup

# Triggers on pushes to main that touch the signup package or this
# workflow file. The signup app has no cross-package imports, so
# changes outside its directory cannot affect its build.
on:
  push:
    branches: [main]
    paths:
      - 'packages/llm_tracker_signup/**'
      - '.github/workflows/deploy-signup.yml'
  workflow_dispatch:

concurrency:
  group: deploy-llm-tracker-signup
  cancel-in-progress: true

jobs:
  deploy:
    name: fly deploy llm-tracker-signup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # `working-directory` matches the Dockerfile's COPY paths
      # (`pyproject.toml` + `src/`) which are relative to this
      # package's root. Running flyctl from the repo root with `-c`
      # would keep cwd at the repo root, making the build context
      # the repo root — there is no top-level `src/`, so the build
      # fails on `COPY src /build/src`.
      - run: flyctl deploy --remote-only
        working-directory: packages/llm_tracker_signup
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
