[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-tracker"
version = "0.0.1"
description = "Local sidecar proxy framework for LLM API traffic observation and control."
requires-python = ">=3.11"
authors = [{ name = "Userfriendly Team" }]
license = { text = "Proprietary (internal research use)" }

dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "httpx[http2]",
    "pydantic",
    "pydantic-settings",
    "python-dotenv",
    "structlog",
    "typer",
    "sqlalchemy[asyncio]",
    "aiosqlite",
    "alembic",
    "python-ulid",
    "llm-tracker-sdk",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "respx",
    "ruff",
    "mypy",
]

[project.scripts]
llm-tracker = "llm_tracker.cli:app"
claude-manage = "llm_tracker.cli.manage:main"

[tool.uv.sources]
llm-tracker-sdk = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/llm_tracker"]
