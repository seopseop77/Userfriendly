[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-tracker-plugin-keyword-block"
version = "0.1.0"
description = "Server-side request gate for llm-tracker. Blocks requests whose body matches a keyword from `LLMTRACK_KEYWORD_BLOCK_LIST` (comma-separated, case-insensitive). Empty list → never blocks. Phase-1c `scope_guard` remains the proper full-scale content-policy surface."
requires-python = ">=3.11"
authors = [{ name = "Userfriendly Team" }]
license = { text = "Proprietary (internal research use)" }

dependencies = [
    "llm-tracker-sdk",
]

[project.entry-points."llm_tracker.plugins"]
keyword_block = "llm_tracker_plugin_keyword_block:KeywordBlockPlugin"

[tool.uv.sources]
llm-tracker-sdk = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/llm_tracker_plugin_keyword_block"]
