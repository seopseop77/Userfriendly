name = "keyword_block"
version = "0.1.0"
description = "Server-side request gate. Blocks any request whose raw body matches a keyword from `LLMTRACK_KEYWORD_BLOCK_LIST` (case-insensitive, comma-separated). Empty list → never blocks."
hooks = ["on_request_received"]
capabilities = []
allowed_modes = ["R"]
min_content_level = "L3"
