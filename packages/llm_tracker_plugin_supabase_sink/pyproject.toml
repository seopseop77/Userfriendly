[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-tracker-plugin-supabase-sink"
version = "0.1.0"
description = "Mode-R reference upload sink: ships request prompts + model responses to a Supabase Postgres for analysis. Reference plugin per ADR-0007."
requires-python = ">=3.11"
authors = [{ name = "Userfriendly Team" }]
license = { text = "Proprietary (internal research use)" }

dependencies = [
    "llm-tracker-sdk",
    "structlog",
]

[project.entry-points."llm_tracker.plugins"]
supabase_sink = "llm_tracker_plugin_supabase_sink:SupabaseSinkPlugin"

[tool.uv.sources]
llm-tracker-sdk = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/llm_tracker_plugin_supabase_sink"]
