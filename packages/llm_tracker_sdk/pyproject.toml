[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-tracker-sdk"
version = "0.0.1"
description = "Plugin SDK for llm-tracker — public interface for authoring plugins."
requires-python = ">=3.11"
authors = [{ name = "Userfriendly Team" }]
license = { text = "Proprietary (internal research use)" }

dependencies = [
    "pydantic",
]

[tool.hatch.build.targets.wheel]
packages = ["src/llm_tracker_sdk"]
