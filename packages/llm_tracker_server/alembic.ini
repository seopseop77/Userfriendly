# Alembic configuration for the central llm-tracker server (PostgreSQL).
# `env.py` overrides `sqlalchemy.url` from the LLMTRACK_DATABASE_URL env
# var, so the value below is only the fallback shape for documentation
# and one-off offline-mode invocations.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

sqlalchemy.url = postgresql+asyncpg://localhost:5432/llm_tracker

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
