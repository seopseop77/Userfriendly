<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Participant Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  <div class="max-w-2xl mx-auto px-6 py-12">
    <header class="mb-8">
      <h1 class="text-3xl font-semibold text-slate-900">Research Participant Signup</h1>
      <p class="mt-2 text-slate-600">
        Register below to receive an API token for the study.
        Your token is shown once after submission &mdash; save it
        before closing the page.
      </p>
    </header>

    {% if error %}
    <div class="mb-6 rounded border border-red-300 bg-red-50 px-4 py-3 text-red-800">
      {{ error }}
    </div>
    {% endif %}

    <form id="signup-form" method="post" action="/register" enctype="multipart/form-data" class="space-y-5 bg-white shadow-sm rounded-lg p-6 border border-slate-200">
      <div>
        <label for="name" class="block text-sm font-medium text-slate-700">Full name</label>
        <input type="text" id="name" name="name" required value="{{ form.name or '' }}"
               class="mt-1 block w-full rounded border-slate-300 shadow-sm focus:border-slate-500 focus:ring-slate-500 sm:text-sm px-3 py-2 border" />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
        <input type="email" id="email" name="email" required value="{{ form.email or '' }}"
               class="mt-1 block w-full rounded border-slate-300 shadow-sm focus:border-slate-500 focus:ring-slate-500 sm:text-sm px-3 py-2 border" />
      </div>

      <div>
        <label for="institution" class="block text-sm font-medium text-slate-700">Institution</label>
        <input type="text" id="institution" name="institution" required value="{{ form.institution or '' }}"
               class="mt-1 block w-full rounded border-slate-300 shadow-sm focus:border-slate-500 focus:ring-slate-500 sm:text-sm px-3 py-2 border" />
      </div>

      <div class="pt-2">
        <button type="submit" id="submit-btn"
                class="inline-flex items-center justify-center px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded hover:bg-slate-800 disabled:opacity-60 disabled:cursor-not-allowed">
          <span id="submit-label">Register</span>
          <span id="submit-spinner" class="hidden ml-2 inline-block h-4 w-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        </button>
      </div>
    </form>
  </div>

  <script>
    (function () {
      const form = document.getElementById('signup-form');
      const btn = document.getElementById('submit-btn');
      const label = document.getElementById('submit-label');
      const spinner = document.getElementById('submit-spinner');

      form.addEventListener('submit', function (e) {
        btn.disabled = true;
        label.textContent = 'Submitting...';
        spinner.classList.remove('hidden');
      });
    })();
  </script>
</body>
</html>
