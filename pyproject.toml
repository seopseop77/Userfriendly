# Workspace root — not a package. Each package lives under packages/.
# Install all packages (editable): uv sync
# Install a single package via git URL:
#   pip install "git+https://...#subdirectory=packages/llm_tracker"

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "packages/llm_tracker/tests",
    "packages/llm_tracker_server/tests",
    "packages/llm_tracker_agent/tests",
    "packages/llm_tracker_plugin_token_counter/tests",
    "packages/llm_tracker_plugin_keyword_block/tests",
    "packages/llm_tracker_plugin_supabase_sink/tests",
    "packages/llm_tracker_plugin_analytics_sink/tests",
]
